name: Build & Test Android App

on:
  push:
    branches:
      - main
      - master
      - develop
      - dev
      - '**'
  pull_request:
  workflow_dispatch:

env:
  # ✅ força as actions JavaScript a rodarem em Node 24
  # recomendado pelo GitHub durante a transição do Node 20 -> Node 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

  # ✅ ajuda a reduzir ruído de UI/AWT em ambiente headless
  JAVA_TOOL_OPTIONS: -Djava.awt.headless=true

jobs:
  build-test:
    name: Build & Test Android App
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Show Java / Gradle versions
        run: |
          java -version
          ./gradlew --version

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports
          path: |
            app/build/reports/tests/
            app/build/test-results/
