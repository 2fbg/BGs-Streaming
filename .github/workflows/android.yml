name: Build & Test Android App

on:
  push:
    branches:
      - main
      - master
      - develop
      - dev
      - '**'
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  JAVA_TOOL_OPTIONS: -Djava.awt.headless=true

jobs:
  build-test:
    name: Build & Test Android App
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Locate Gradle Wrapper
        id: locate_gradle
        shell: bash
        run: |
          set -e

          GRADLEW_PATH=$(find . -type f -name "gradlew" \
            -not -path "*/build/*" \
            -not -path "*/.gradle/*" \
            | head -n 1)

          if [ -z "$GRADLEW_PATH" ]; then
            echo "❌ Arquivo gradlew não encontrado no repositório."
            echo "Conteúdo encontrado:"
            find . -maxdepth 3 -type f | sort | sed -n '1,200p'
            exit 1
          fi

          PROJECT_DIR=$(dirname "$GRADLEW_PATH")

          echo "✅ gradlew encontrado em: $GRADLEW_PATH"
          echo "✅ diretório do projeto: $PROJECT_DIR"

          echo "gradlew_path=$GRADLEW_PATH" >> "$GITHUB_OUTPUT"
          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"

      - name: Make gradlew executable
        run: chmod +x "${{ steps.locate_gradle.outputs.gradlew_path }}"

      - name: Show Java / Gradle versions
        working-directory: ${{ steps.locate_gradle.outputs.project_dir }}
        run: |
          java -version
          ./gradlew --version

      - name: Build debug APK
        working-directory: ${{ steps.locate_gradle.outputs.project_dir }}
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Run unit tests
        working-directory: ${{ steps.locate_gradle.outputs.project_dir }}
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports
          path: |
            ${{ steps.locate_gradle.outputs.project_dir }}/app/build/reports/tests/
            ${{ steps.locate_gradle.outputs.project_dir }}/app/build/test-results/
